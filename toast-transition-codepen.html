<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast Transition — CodePen Demo</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f2f5;
      font-family: -apple-system, "Noto Sans TC", "PingFang TC", sans-serif;
      color: #212b36;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 24px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toggle-btn {
      border: 1px solid #dfe3e8;
      background: #fff;
      color: #212b36;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease;
      font-family: inherit;
    }
    .toggle-btn:hover { background: #f4f6f8; }

    .state-label {
      font-size: 13px;
      color: #637381;
    }
    .state-label strong { color: #212b36; }

    /* ── Stage ── */
    .stage {
      position: relative;
      width: 460px;
      height: 420px;
      background: #fff;
      border-radius: 12px;
      border: 1px dashed #d2d8df;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 24px;
    }

    /* ── Toast ── */
    .toast {
      overflow: hidden;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);

      /* Animated properties */
      width: 280px;
      max-height: 60px;
      transition-property: width, max-height, border-radius, box-shadow;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 240ms;
    }

    .toast.is-open {
      width: 360px;
      max-height: 400px;
      border-radius: 12px;
      box-shadow: 0 20px 40px -4px rgba(145, 158, 171, 0.16);
      transition-timing-function: cubic-bezier(0.22, 0.8, 0.24, 1);
      transition-duration: 360ms;
    }

    /* ── Header ── */
    .toast__header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #f4f6f8;
    }

    .toast__title {
      flex: 1;
      font-size: 18px;
      line-height: 24px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #212b36;
    }

    .chevron-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: #33404d;
      flex-shrink: 0;
      transition: background 120ms ease;
    }
    .chevron-btn:hover { background: rgba(145, 158, 171, 0.08); }

    .chevron {
      display: block;
      transition: transform 180ms cubic-bezier(0.2, 0, 0, 1);
      transform: rotate(180deg);
    }
    .toast.is-open .chevron { transform: rotate(0deg); }

    /* ── Content ── */
    .toast__content {
      padding: 0 16px;
      background: #fff;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 140ms ease, transform 180ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toast.is-open .toast__content {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 140ms ease 60ms, transform 180ms cubic-bezier(0.22, 0.8, 0.24, 1) 60ms;
    }

    /* ── Rows ── */
    .row {
      padding: 12px 0;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 130ms ease, transform 180ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toast.is-open .row:nth-child(1) {
      opacity: 1; transform: translateY(0);
      transition: opacity 130ms ease 80ms, transform 180ms cubic-bezier(0.22, 0.8, 0.24, 1) 80ms;
    }
    .toast.is-open .row:nth-child(3) {
      opacity: 1; transform: translateY(0);
      transition: opacity 130ms ease 104ms, transform 180ms cubic-bezier(0.22, 0.8, 0.24, 1) 104ms;
    }
    .toast.is-open .row:nth-child(5) {
      opacity: 1; transform: translateY(0);
      transition: opacity 130ms ease 128ms, transform 180ms cubic-bezier(0.22, 0.8, 0.24, 1) 128ms;
    }

    .row__top {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 16px;
      font-weight: 500;
      color: #637381;
      white-space: nowrap;
      flex-shrink: 0;
      padding: 4px 0;
    }

    .dot {
      font-size: 16px;
      font-weight: 500;
      color: #919eab;
      flex-shrink: 0;
      padding: 0 2px;
    }

    .row-title {
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #212b36;
      flex: 1;
      min-width: 0;
    }

    .row__bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .row__bottom-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .status-badge {
      font-size: 16px;
      font-weight: 400;
      padding: 3px 8px 5px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-badge.processing {
      background: rgba(24, 144, 255, 0.16);
      color: #0c53b7;
    }
    .status-badge.success {
      background: rgba(84, 214, 44, 0.16);
      color: #229a16;
    }

    .row-count {
      font-size: 16px;
      color: #637381;
      white-space: nowrap;
    }

    .btn-view {
      background: #00a15d;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 18px;
      font-weight: 700;
      line-height: 24px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: inherit;
    }

    .divider { height: 1px; background: #eeeff1; }

    /* ── Spec table ── */
    .spec {
      width: 460px;
      background: #fff;
      border-radius: 10px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .spec-title {
      font-size: 13px;
      font-weight: 700;
      color: #637381;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .spec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .spec-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .spec-value {
      font-size: 22px;
      font-weight: 700;
      color: #212b36;
    }
    .spec-value.green { color: #00a15d; }

    .spec-label {
      font-size: 12px;
      color: #637381;
    }

    .spec-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .spec-detail {
      font-size: 12px;
      color: #637381;
      line-height: 1.6;
    }
    .spec-detail code {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      background: #f4f6f8;
      padding: 1px 5px;
      border-radius: 3px;
      color: #212b36;
    }
  </style>
</head>
<body>

  <!-- Controls -->
  <div class="controls">
    <button class="toggle-btn" id="toggleBtn">收合 Toast</button>
    <span class="state-label">狀態：<strong id="stateText">open</strong></span>
  </div>

  <!-- Stage -->
  <div class="stage">
    <div class="toast is-open" id="toast">

      <!-- Header -->
      <div class="toast__header">
        <span class="toast__title">2 項批改進行中…</span>
        <button class="chevron-btn" id="chevronBtn" aria-label="toggle">
          <svg class="chevron" width="20" height="20" viewBox="0 0 28 28" fill="none">
            <path d="M18.524 10.8393L13.9973 15.366L9.47062 10.8393C9.01562 10.3843 8.28062 10.3843 7.82562 10.8393C7.37063 11.2943 7.37063 12.0293 7.82562 12.4843L13.1806 17.8393C13.6356 18.2943 14.3706 18.2943 14.8256 17.8393L20.1806 12.4843C20.6356 12.0293 20.6356 11.2943 20.1806 10.8393C19.7256 10.396 18.979 10.3843 18.524 10.8393Z" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <!-- Content -->
      <div class="toast__content">

        <!-- Row 1：多篇，批改中 -->
        <div class="row">
          <div class="row__top">
            <span class="tag">多篇</span>
            <span class="dot">·</span>
            <span class="row-title">美好的季節</span>
          </div>
          <div class="row__bottom">
            <div class="row__bottom-left">
              <span class="status-badge processing">批改中…</span>
              <span class="row-count">0 / 2 篇已完成</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Row 2：單篇，批改中 -->
        <div class="row">
          <div class="row__top">
            <span class="tag">單篇</span>
            <span class="dot">·</span>
            <span class="row-title">美好的季節</span>
          </div>
          <div class="row__bottom">
            <div class="row__bottom-left">
              <span class="status-badge processing">批改中…</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Row 3：多篇，成功 + 查看 -->
        <div class="row">
          <div class="row__top">
            <span class="tag">多篇</span>
            <span class="dot">·</span>
            <span class="row-title">美好的季節</span>
          </div>
          <div class="row__bottom">
            <div class="row__bottom-left">
              <span class="status-badge success">成功</span>
            </div>
            <button class="btn-view">查看</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Spec -->
  <div class="spec">
    <span class="spec-title">動效規格</span>
    <div class="spec-grid">
      <div class="spec-item">
        <span class="spec-value green">360ms</span>
        <span class="spec-label">展開時長</span>
      </div>
      <div class="spec-item">
        <span class="spec-value">240ms</span>
        <span class="spec-label">收合時長</span>
      </div>
    </div>
    <div class="spec-row">
      <span class="spec-detail">展開 easing <code>cubic-bezier(0.22, 0.8, 0.24, 1)</code></span>
      <span class="spec-detail">收合 easing <code>cubic-bezier(0.4, 0, 0.2, 1)</code></span>
      <span class="spec-detail">寬度 <code>280px → 360px</code> · 圓角 <code>28px → 12px</code> · 高度 <code>60px → 400px</code></span>
      <span class="spec-detail">內容 fade delay <code>60ms</code> · 各列 stagger <code>80ms + n×24ms</code></span>
    </div>
  </div>

  <script>
    const toast = document.getElementById('toast');
    const toggleBtn = document.getElementById('toggleBtn');
    const stateText = document.getElementById('stateText');
    const chevronBtn = document.getElementById('chevronBtn');

    let isOpen = true;

    function toggle() {
      isOpen = !isOpen;
      toast.classList.toggle('is-open', isOpen);
      toggleBtn.textContent = isOpen ? '收合 Toast' : '展開 Toast';
      stateText.textContent = isOpen ? 'open' : 'closed';
    }

    toggleBtn.addEventListener('click', toggle);
    chevronBtn.addEventListener('click', toggle);
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') toggle(); });
  </script>

</body>
</html>
